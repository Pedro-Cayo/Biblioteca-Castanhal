<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title> Encomendar_Livro </title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <a href="index.html">
            <button type="button">Voltar ao Início</button>
        </a>

        <h1>Encomendar Livro</h1>
        
        <fieldset>
            <legend><strong> Buscar no Catálogo (Open Library) </strong></legend>
            <div>
                <label for="buscaLivro"> Título ou Autor: </label>
                <input type="text" id="buscaLivro" placeholder="Ex: O Senhor dos Anéis">
            </div>
            <br>
            <button type="button" onclick="buscarLivros()">Buscar Livro</button>
        </fieldset>

        <br><br>

        <div id="resultadosBusca"></div>

        <script>
            // Função da chamada da API
            async function buscarLivros() {
                const termoBusca = document.getElementById('buscaLivro').value;
                const divResultados = document.getElementById('resultadosBusca');
                
                if (!termoBusca) {
                    alert('Por favor, digite o nome de um livro ou autor para buscar.');
                    return;
                }

                try {
                    // Faz a requisição para a API com limite de 10 resultados
                    const response = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(termoBusca)}&limit=10`);
                    const data = await response.json();

                    divResultados.innerHTML = ''; 

                    if (data.docs.length === 0) {
                        divResultados.innerHTML = '<p>Nenhum livro encontrado.</p>';
                        return;
                    }

                    // Cria o template de cada livro
                    data.docs.forEach(livro => {
                        const titulo = livro.title;
                        const autor = livro.author_name ? livro.author_name.join(', ') : 'Autor desconhecido';
                        const ano = livro.first_publish_year ? livro.first_publish_year : 'Ano desconhecido';

                        const itemDiv = document.createElement('div');
                        itemDiv.style.borderBottom = "1px solid #ccc";
                        itemDiv.style.paddingBottom = "10px";
                        itemDiv.style.marginBottom = "10px";

                        itemDiv.innerHTML = `
                        <p><strong>${titulo}</strong></p>
                        <p>Autor(a): ${autor} | Lançamento: ${ano}</p>
                    `;

                        const botaoEncomendar = document.createElement('button');
                        botaoEncomendar.type = "button";
                        botaoEncomendar.textContent = "Encomendar";
            
                        botaoEncomendar.addEventListener('click', () => encomendar(titulo));

                        itemDiv.appendChild(botaoEncomendar);

                        divResultados.appendChild(itemDiv);
                    });

                } catch (error) {
                    console.error("Erro ao consumir a Open Library API:", error);
                    divResultados.innerHTML = '<p>Erro ao conectar com a biblioteca. Tente novamente.</p>';
                }
            }

            // Disparo da mensagem de sucesso
            function encomendar(tituloDoLivro) {
                alert(`Sucesso! O livro "${tituloDoLivro}" foi encomendado e logo chegará ao estoque.`);
            }
        </script>
    </body>
</html>
