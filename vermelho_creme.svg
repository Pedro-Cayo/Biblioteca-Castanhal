<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base: soft blush cream -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf1ea"/>
      <stop offset="55%" stop-color="#f7ebe2"/>
      <stop offset="100%" stop-color="#f3e3d6"/>
    </linearGradient>

    <linearGradient id="redGradV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#9c2a20"/>
    </linearGradient>

    <linearGradient id="redGradH" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#9c2a20"/>
    </linearGradient>

    <linearGradient id="vignette" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3a1a12" stop-opacity="0.12"/>
      <stop offset="20%" stop-color="#3a1a12" stop-opacity="0"/>
      <stop offset="80%" stop-color="#3a1a12" stop-opacity="0"/>
      <stop offset="100%" stop-color="#3a1a12" stop-opacity="0.18"/>
    </linearGradient>

    <filter id="paperTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="4" result="noise"/>
      <feColorMatrix in="noise" type="matrix"
        values="0 0 0 0 0.75
                0 0 0 0 0.35
                0 0 0 0 0.28
                0 0 0 0.035 0"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  <rect width="1920" height="1080" filter="url(#paperTexture)" opacity="0.4"/>

  <!-- Top red ribbon -->
  <rect x="0" y="0" width="1920" height="110" fill="url(#redGradH)"/>
  <rect x="0" y="108" width="1920" height="6" fill="#ffffff" opacity="0.5"/>

  <!-- Right red ribbon -->
  <rect x="1770" y="0" width="120" height="1080" fill="url(#redGradV)"/>
  <rect x="1758" y="0" width="6" height="1080" fill="#ffffff" opacity="0.5"/>

  <!-- Overall vignette -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
